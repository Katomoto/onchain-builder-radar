name: Daily Onchain Builder Report

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run bot
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TALENT_WALLET: ${{ secrets.TALENT_WALLET }}
          GITHUB_USERNAME: Katomoto
          GITHUB_REPOSITORY: Katomoto/onchain-builder-radar
        run: node bot.js

      - name: Commit and push report
        run: |
          git config user.name "Katomoto"
          git config user.email "Katomoto@users.noreply.github.com"
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add reports/
          git diff --staged --quiet || git commit -m "📊 Daily onchain builder report $(date +'%Y-%m-%d')"
          git push https://Katomoto:${{ secrets.GH_PAT }}@github.com/Katomoto/onchain-builder-radar.git main
